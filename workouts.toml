[[events]]
feed = "lifting"
id = "upper-a"
summary = "Two 35s: Upper Strength"
day = "MO"
start = "07:00"
duration_minutes = 30
sequence = 7
location = "Apartment"
categories = ["FITNESS", "LIFTING", "KETTLEBELL", "UPPER"]
kettlebell_movements = ["strict-press", "one-arm-row", "double-floor-press", "double-farmer-walk", "push-up", "plank-pull-through", "cable-rope-crunch"]
description = """
Calendar block: 7:00-7:30 local. Full menu: 45 minutes.
Start at the top, keep transitions quick, and stop at 7:30. Unfinished work is optional, not debt.

0-5 min - Warm-up:
- Shoulder circles, scapular push-ups, light rows, and 8 easy push-ups.

5-17 min - Block A, 4 controlled rounds:
- Single-arm strict press: 5-8 each side.
- One-arm row: 8-12 each side.
- Rest only as needed to keep the reps clean.

17-29 min - Block B, 3 rounds:
- Double kettlebell floor press: 8-12. Use one bell if getting both into position is awkward.
- Double farmer walk or march: 30-45 sec.

29-39 min - Block C, 3 rounds:
- Push-ups: 8-20, stopping 1-2 clean reps before failure.
- Kettlebell plank pull-through: 6 each side.

39-45 min - Here's your abs:
- Cable available: rope crunch, 3 hard sets x 8-15 with a slow return.
- At home: plank pull-through, 3 x 6-10 each side.

Fixed-weight rule:
- If 35 lb is too heavy overhead, use a push press or floor press. Never grind an ugly rep.
"""

[[events]]
feed = "lifting"
id = "lower-a"
summary = "Two 35s: Squat + Legs"
day = "TU"
start = "07:00"
duration_minutes = 30
sequence = 7
location = "Apartment"
categories = ["FITNESS", "LIFTING", "KETTLEBELL", "LOWER"]
kettlebell_movements = ["double-front-squat", "goblet-squat", "calf-raise", "reverse-lunge", "double-rdl", "swing", "dead-bug"]
description = """
Calendar block: 7:00-7:30 local. Full menu: 45 minutes.
Start at the top, keep transitions quick, and stop at 7:30. Unfinished work is optional, not debt.

0-5 min - Warm-up:
- Hip circles, hinges, bodyweight squats, and glute bridges.

5-17 min - Block A, 4 controlled rounds:
- Double front squat: 5-8.
- Calf raise holding both bells: 12-20.
- If the double rack is not secure, use one goblet squat for 10-15.

17-29 min - Block B, 3 rounds:
- Front-rack or goblet reverse lunge: 6-8 each leg.
- Double kettlebell Romanian deadlift: 8-12.

29-39 min - Block C, alternating every minute:
- Minute 1: two-hand swings, 12-15 crisp reps.
- Minute 2: dead bug, 8 each side.
- Repeat for 5 rounds.

39-45 min - Here's your abs:
- Dead bug: 3 x 8 each side with a full exhale.
- Or cable rope crunch: 3 hard sets x 8-15 if you are at the gym.

Fixed-weight rule:
- Use the goblet version when two bells compromise rack position or squat depth. Substitute deadlifts for swings until the hinge feels automatic.
"""

[[events]]
feed = "lifting"
id = "wednesday-choice"
summary = "Two 35s: Full-Body Conditioning"
day = "WE"
start = "07:00"
duration_minutes = 30
sequence = 7
location = "Apartment"
categories = ["FITNESS", "LIFTING", "KETTLEBELL", "FULL BODY"]
kettlebell_movements = ["clean-push-press", "one-arm-row", "push-up", "double-farmer-walk", "swing", "hollow-hold", "calf-raise"]
description = """
Calendar block: 7:00-7:30 local. Full menu: 45 minutes.
Start at the top, keep transitions quick, and stop at 7:30. This is the moderate day; stay crisp, not crushed.

0-5 min - Warm-up:
- March in place, shoulder circles, hip hinges, and 8 easy push-ups.

5-17 min - Block A, 3 rounds:
- Single-arm clean + push press: 4-6 each side.
- One-arm row: 8 each side.
- Use two hands to guide the bell down if needed.

17-32 min - Block B, 5 rounds of a 3-minute rotation:
- Minute 1: push-ups, 8-15.
- Minute 2: double farmer walk or march, 40 sec.
- Minute 3: two-hand swings, 12-15.

32-40 min - Block C, 2-3 rounds:
- Hollow hold: 20-30 sec.
- Calf raise holding both bells: 15-20.
- Easy walk or shakeout: 30 sec.

40-45 min - Here's your abs:
- Hollow hold: 3 x 20-30 sec.
- Or cable rope crunch: 3 hard sets x 8-15 if you are at the gym.

Fixed-weight rule:
- A 35 lb clean or press should feel controlled. Use a two-hand clean to the rack or switch to floor press if it does not.
"""

