description = """
Calendar block: 7:00-7:30 local. Full menu: 45 minutes.
Start at the top, keep transitions quick, and stop at 7:30. Unfinished work is optional, not debt.

0-5 min - Warm-up:
- Hip hinges, reverse lunges, glute bridges, and bodyweight squats.

5-17 min - Block A, 4 controlled rounds:
- Double kettlebell Romanian deadlift: 8-10.
- Paused goblet squat: 10 with a 2-sec pause at the bottom.

17-29 min - Block B, 3 rounds:
- Split squat: 8 each leg.
- Single-leg Romanian deadlift: 8 each leg, one bell in the opposite hand.

29-39 min - Block C:
- Every 2 minutes for 5 rounds: 12-15 crisp two-hand swings.
- Walk and breathe for the rest of each 2-minute window.

39-45 min - Here's your abs:
- Heavy suitcase march: 3 x 30-45 sec each side.
- Keep ribs stacked and do not lean away from the bell.

Fixed-weight rule:
- Slow the lowering or add the pause before adding reps. Stop swings when the snap or back position fades.
"""

