[[events]]
feed = "cardio"
id = "long-run"
summary = "Run: Long Easy 4-6 mi"
day = "SA"
start = "09:00"
duration_minutes = 75
location = "Outside or treadmill"
categories = ["FITNESS", "CARDIO", "RUN"]
description = """
Long run starts at 9:00 AM.

Goal:
- 4-6 miles easy, conversational pace.
- Start near 4 miles. Hold 4-6 miles for the first few weeks before building.
- No pace chasing. This is discipline and aerobic base.

Simple progression:
- Weeks 1-2: 4 miles.
- Weeks 3-4: 5 miles.
- Weeks 5+: 6 miles if recovering well.
- Every fourth week: cut back to 4 miles.

Minimum version:
- 30 min easy run/walk.
"""

[[events]]
feed = "cardio"
id = "long-swim"
summary = "Swim: Structured Long Swim"
day = "SU"
start = "09:00"
duration_minutes = 60
location = "Pool"
categories = ["FITNESS", "CARDIO", "SWIM"]
description = """
Long swim starts at 9:00 AM. Smooth, structured, not just wandering around the pool.

Warm-up:
- 200 easy.
- 4 x 50 drill/build: catch-up, fingertip drag, kick, choice.

Main set:
- Ladder: 100, 200, 300, 200, 100 with 20 sec rest.
- 4 x 100 as 75 smooth + 25 strong, 20 sec rest.

Cool-down:
- 100 easy.

Total:
- Full version: about 1,700.
- Short version: stop after the ladder, about 1,100.

Minimum version:
- 20-30 min relaxed swim, keep moving, leave feeling better.
"""
