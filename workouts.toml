[[events]]
feed = "cardio"
id = "long-run"
summary = "Run: Long Easy 4-6 mi"
day = "SA"
start = "07:00"
duration_minutes = 60
sequence = 3
location = "Outside or treadmill"
categories = ["FITNESS", "CARDIO", "RUN"]
description = """
One-hour calendar block starting at 7:00 local.

Goal:
- Run 4-6 miles at an easy, conversational effort.
- Choose the distance by recovery, not ego. Do not speed up just to force 6 miles into the hour.
- Start near 4 miles and hold the range for several weeks before adding more.

Simple progression:
- Weeks 1-2: 4 miles.
- Weeks 3-4: 5 miles if recovering well.
- Weeks 5+: 6 miles if the weekday work and joints feel good.
- Every fourth week: cut back to 4 easy miles.

Minimum version:
- 30 min easy run/walk.
"""

[[events]]
feed = "cardio"
id = "long-swim"
summary = "Swim: Structured 1,500"
day = "SU"
start = "07:00"
duration_minutes = 60
sequence = 5
location = "Pool"
categories = ["FITNESS", "CARDIO", "SWIM"]
description = """
One-hour calendar block starting at 7:00 local. Smooth and structured, not just wandering around the pool.

Warm-up:
- 200 easy.
- 4 x 50 drill: catch-up, fingertip drag, kick, choice.

Main set:
- 2 x 200 steady, 20 sec rest.
- 4 x 100 as 75 smooth + 25 firm, 20 sec rest.
- 4 x 50 build from easy to strong, 15-20 sec rest.

Cool-down:
- 100 easy.

Total:
- Base set: 1,500.
- If time and energy are good, add 4 x 100 pull for 1,900 total.

Minimum version:
- 20-30 min relaxed continuous swimming.
"""
