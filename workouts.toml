[settings]
start_date = "2026-06-08"
timezone = "America/New_York"
namespace = "workout-calendar.rowlandpettit"
site_url = "https://rowlandpettit.com/workout-calendar"
sequence = 0

[feeds.lifting]
name = "Rowland Fitness - Lifting"
filename = "lifting.ics"
description = "Weekday lifting calendar with tight 6:30-7:30 AM sessions."
color = "#1f7a5c"

[feeds.cardio]
name = "Rowland Fitness - Cardio"
filename = "cardio.ics"
description = "Dedicated weekend endurance calendar."
color = "#c94f2d"

[[events]]
feed = "lifting"
id = "upper-a"
summary = "Lift: Upper A + Easy Run"
day = "MO"
start = "06:30"
duration_minutes = 60
sequence = 2
location = "Gym or home"
categories = ["FITNESS", "LIFTING", "UPPER"]
description = """
Stop at 7:30 even if unfinished.

5 min warm-up:
- Easy walk or bike, shoulder circles, band pull-aparts, 10 push-ups.

30 min lift - Gym:
- Bench press: 4 x 5-8.
- Chest-supported row: 4 x 8.
- Incline DB press: 3 x 8-10.
- Pull-ups or lat pulldown: 3 x 8-10.
- Lateral raise + triceps pressdown: 2 x 12 each if time.

30 min lift - Kettlebell:
- Clean + press: 5 x 5 each side.
- One-arm row: 4 x 8 each side.
- Floor press: 4 x 10.
- Push-up + suitcase carry: 3 rounds.

30 min lift - No equipment:
- Push-ups: 4 strong sets.
- Pike push-ups: 3 x 8-12.
- Prone swimmers: 3 x 12.
- Chair dips: 3 x 10-15.
- Plank: 3 x 45 sec.

After lift:
- Easy treadmill run: 2 miles or 20 min cap, whichever comes first.

Here's your abs:
- Default: cable rope crunch, 4-5 hard sets x 8-15. Go heavy, but keep it clean.
- Last set: drop the weight 20-30% and rep out close to failure.
- Cues: kneel, hips locked, ribs down to pelvis, hard exhale, 1-sec squeeze, slow return.
- Or pick one: hanging leg raise/captain's chair 3-4 x 8-12; ab wheel rollout 3-4 x 6-12; cable wood chop/lift 3 x 10 each side; Pallof press 3 x 10-15 each side; weighted decline sit-up 3 x 8-12; suitcase carry 3-4 heavy walks; farmer carry 3-4 heavy walks.

Minimum version:
- Warm-up, bench/push-up, row/pull, 10 min easy jog.
"""

