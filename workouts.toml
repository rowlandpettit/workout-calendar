[[events]]
feed = "cardio"
id = "long-run"
summary = "Run: Long Easy 4-6 mi"
day = "SA"
start = "06:30"
duration_minutes = 90
sequence = 2
location = "Outside or treadmill"
categories = ["FITNESS", "CARDIO", "RUN"]
description = """
Long run starts at 6:30 local time.

Goal:
- 4-6 miles easy, conversational pace.
- Start near 4 miles. Hold 4-6 miles for the first few weeks before building.
- No pace chasing. This is discipline and aerobic base.

Simple progression:
- Weeks 1-2: 4 miles.
- Weeks 3-4: 5 miles.
- Weeks 5+: 6 miles if recovering well.
- Every fourth week: cut back to 4 miles.

Minimum version:
- 30 min easy run/walk.
"""

[[events]]
feed = "cardio"
id = "long-swim"
summary = "Swim or KB: Sunday"
day = "SU"
start = "06:30"
duration_minutes = 60
sequence = 4
location = "Pool or home"
categories = ["FITNESS", "CARDIO", "SWIM", "KETTLEBELL"]
kettlebell_reference_url = "https://www.youtube.com/watch?v=uQZZdGF16KQ"
kettlebell_movements = ["halo", "hip-hinge", "goblet-squat", "swing", "clean-press", "reverse-lunge", "one-arm-row", "suitcase-carry"]
description = """
Sunday starts at 6:30 local time. Pick the swim if you have pool access; pick the 35 lb kettlebell workout if you are home, traveling, or just want to move today.

Option A - Structured long swim:
- Smooth and structured, not just wandering around the pool.

Swim warm-up:
- 200 easy.
- 4 x 50 drill/build: catch-up, fingertip drag, kick, choice.

Swim main set:
- Ladder: 100, 200, 300, 200, 100 with 20 sec rest.
- 4 x 100 as 75 smooth + 25 strong, 20 sec rest.

Swim cool-down:
- 100 easy.

Swim total:
- Full version: about 1,700.
- Short version: stop after the ladder, about 1,100.

Option B - 35 lb kettlebell workout:
- 5 min warm-up: halos, hip hinges, prying goblet squats, shoulder circles.
- 4-6 rounds, rest 60-90 sec between rounds:
  - 15 two-hand swings.
  - 8 goblet squats.
  - 6 clean + press each side.
  - 8 reverse lunges each side, goblet or rack hold.
  - 10 one-arm rows each side.
  - 30-45 sec suitcase carry each side.
- Keep it crisp. If form slips, stop the round count there.

KB minimum version:
- 3 rounds: swings, goblet squats, clean + press, suitcase carry.

Minimum version:
- 20-30 min relaxed swim or 20 min kettlebell circuit. Keep moving, leave feeling better.
"""
